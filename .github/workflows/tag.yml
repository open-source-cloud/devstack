name: Tag

# Conventional-commit → automatic v* semver tag (spec 25). On every push to main
# this computes the next version with svu (pinned) and, IF enabled, pushes a v*
# tag — which fires the unchanged release.yml → goreleaser. The project is in
# BETA: svu runs with --v0 (KeepV0) so a BREAKING change bumps the MINOR, never
# 1.0.0, and a guard step refuses any non-0.x tag as defense-in-depth.
#
# Kill-switch: the tag is pushed only when the owner-provisioned RELEASE_TOKEN
# secret is present. Without it the job computes + logs the version and exits 0
# WITHOUT pushing, so a private / pre-public repo never auto-releases.

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**", "LICENSE", "NOTICE"]
  workflow_dispatch: {}

# Least privilege: the tag PUSH authenticates via RELEASE_TOKEN's remote URL, not
# GITHUB_TOKEN — so this workflow only needs read. (A tag pushed with the default
# GITHUB_TOKEN would NOT re-trigger release.yml; GitHub suppresses events from it.)
permissions:
  contents: read

# Never race two taggers; do not cancel an in-flight tag push.
concurrency:
  group: tag-main
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    # JOB-level so the push step's `if:` can read it. A step-level env: is invisible
    # to that same step's own if: expression — putting it there silently disables
    # the push.
    env:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for svu (checkout uses GITHUB_TOKEN; push uses RELEASE_TOKEN)
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: install svu (pinned)
        run: go install github.com/caarlos0/svu/v3@v3.4.1
      - name: compute next version
        id: svu
        run: |
          CUR="$(git describe --tags --abbrev=0 2>/dev/null || echo v0.0.0)"
          NEXT="$(svu next --v0)"
          echo "current=$CUR" >> "$GITHUB_OUTPUT"
          echo "next=$NEXT"   >> "$GITHUB_OUTPUT"
          echo "svu: $CUR -> $NEXT"
      - name: 0.x guard (a stray feat!/BREAKING must NEVER yield v1.0.0 while in BETA)
        run: |
          case "${{ steps.svu.outputs.next }}" in
            v0.*) echo "ok: ${{ steps.svu.outputs.next }} is on the 0.x beta line" ;;
            *) echo "::error::refusing non-0.x tag ${{ steps.svu.outputs.next }} while in BETA"; exit 1 ;;
          esac
      - name: push tag (only when enabled + a real bump)
        if: ${{ steps.svu.outputs.next != steps.svu.outputs.current && env.RELEASE_TOKEN != '' }}
        run: |
          git config user.name  "devstack-release[bot]"
          git config user.email "release@devstack.local"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/${{ github.repository }}.git"
          git tag "${{ steps.svu.outputs.next }}"
          git push origin "${{ steps.svu.outputs.next }}" # fires release.yml (RELEASE_TOKEN != GITHUB_TOKEN)
          echo "pushed ${{ steps.svu.outputs.next }}"
      - name: report (no push)
        if: ${{ !(steps.svu.outputs.next != steps.svu.outputs.current && env.RELEASE_TOKEN != '') }}
        run: |
          if [ "${{ steps.svu.outputs.next }}" = "${{ steps.svu.outputs.current }}" ]; then
            echo "no release due: no version-bumping commits since ${{ steps.svu.outputs.current }}"
          else
            echo "tagging disabled: RELEASE_TOKEN is unset (pre-public kill-switch); would have pushed ${{ steps.svu.outputs.next }}"
          fi
