name: devstack-api
services:
  api:
    build:
      context: api/build
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "8.3"
        WITH_COMPOSER: "true"
    cpus: 1.5
    command:
      - php-fpm
    deploy:
      resources:
        limits:
          cpus: 1.5
          memory: "805306368"
          pids: 512
        reservations:
          memory: "268435456"
    entrypoint:
      - /entrypoint.sh
    environment:
      API_URL: https://api
      APP_ENV: dev
      LARAVEL: "true"
      POSTGRES_DATABASE: api
      POSTGRES_HOST: shared-postgres
      POSTGRES_PASSWORD: null
      POSTGRES_PORT: "5432"
      POSTGRES_USER: api
      XDEBUG_MODE: "off"
    expose:
      - "8080"
    healthcheck:
      test:
        - CMD
        - curl
        - -fsS
        - -o
        - /dev/null
        - http://localhost:8080/healthz
      timeout: 3s
      interval: 5s
      retries: 12
      start_period: 20s
    labels:
      com.devstack.managed: "true"
      com.devstack.project: api
      com.devstack.service: api
      com.devstack.workspace: acme
    mem_limit: "805306368"
    networks:
      default: null
      devstack_shared: null
    pids_limit: 512
    platform: linux/amd64
    restart: unless-stopped
networks:
  default:
    name: devstack-api_default
  devstack_shared:
    name: devstack_shared
    external: true
